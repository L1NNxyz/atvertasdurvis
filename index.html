<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koda Konstruktors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="auroraCanvas" aria-hidden="true"></canvas>
<div class="grain" aria-hidden="true"></div>

<!-- Progress bar -->
<div class="progress-wrap" id="progressWrap">
  <div class="progress-fill" id="progressFill"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast" role="status" aria-live="polite">
  <div class="toast-icon-wrap">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none"
         stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="1.5 7 5 10.5 11.5 2.5"/>
    </svg>
  </div>
  <div>
    <div class="toast-title" id="toastTitle"></div>
    <div class="toast-sub"   id="toastSub"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg">
  <button class="modal-close" id="modalClose" aria-label="Aizvērt">
    <svg width="11" height="11" viewBox="0 0 11 11" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="1" y1="1" x2="10" y2="10"/><line x1="10" y1="1" x2="1" y2="10"/>
    </svg>
  </button>
  <div class="modal-inner" id="modalInner">
    <div class="browser-win">
      <div class="browser-chrome">
        <div class="traffic-lights">
          <div class="tl tl-r" id="tlClose" title="Aizvērt" style="cursor:pointer"></div>
          <div class="tl tl-y"></div>
          <div class="tl tl-g"></div>
        </div>
        <div class="url-bar">
          <span class="url-lock">
            <svg viewBox="0 0 9 11" fill="currentColor">
              <path d="M4.5 0C2.84 0 1.5 1.34 1.5 3v.5H1C.45.5 0 1 0 1.5v8c0 .55.45 1 1 1h7c.55 0 1-.45 1-1v-8c0-.55-.45-1-1-1h-.5V3C7.5 1.34 6.16 0 4.5 0zm0 1.25c1.24 0 2.25 1 2.25 1.75V3.5h-4.5V3C2.25 2.25 3.26 1.25 4.5 1.25z"/>
            </svg>
          </span>
          <span class="url-text">mana-lapa.lv</span>
        </div>
        <div style="width:72px"></div>
      </div>
      <div class="browser-viewport">
        <iframe class="preview-iframe" id="previewFrame" sandbox="allow-scripts"></iframe>
      </div>
    </div>
    <div class="code-panel" id="codePanel">
      <div class="code-panel-header">
        <span class="code-panel-title">Pirmkods</span>
        <span class="code-badge">HTML + CSS</span>
      </div>
      <div class="code-body">
        <pre><code class="language-html" id="codeEl"></code></pre>
      </div>
    </div>
  </div>
  <div class="modal-tabs">
    <button class="m-tab active" id="tabPreview">Priekšskatījums</button>
    <button class="m-tab"        id="tabCode">Kods</button>
  </div>
</div>

<!-- APP -->
<div class="app">

  <header class="header" id="appHeader">
    <div class="logo-mark" id="headerLogo"></div>
    <span class="logo-title">Koda Konstruktors</span>
    <div class="header-sep"></div>
    <div class="challenges-bar">
      <div class="c-pill" id="cp0"><div class="c-dot"></div><span>Sarkans virsraksts</span></div>
      <div class="c-pill" id="cp1"><div class="c-dot"></div><span>Aplis griežas centrā</span></div>
      <div class="c-pill" id="cp2"><div class="c-dot"></div><span>3 krāsas</span></div>
    </div>
    <button class="btn-build" id="btnBuild">Izveidot</button>
  </header>

  <aside class="palette" id="paletteEl">
    <div class="p-section">
      <div class="p-section-head"><span class="p-section-label">Fons</span></div>
      <div class="p-blocks" id="pb-bg"></div>
    </div>
    <div class="p-section">
      <div class="p-section-head"><span class="p-section-label">Krāsa</span></div>
      <div class="p-blocks" id="pb-color"></div>
    </div>
    <div class="p-section">
      <div class="p-section-head"><span class="p-section-label">Teksts</span></div>
      <div class="p-blocks" id="pb-text"></div>
    </div>
    <div class="p-section">
      <div class="p-section-head"><span class="p-section-label">Formas</span></div>
      <div class="p-blocks" id="pb-shape"></div>
    </div>
    <div class="p-section">
      <div class="p-section-head"><span class="p-section-label">Animācija</span></div>
      <div class="p-blocks" id="pb-anim"></div>
    </div>
    <div class="p-section">
      <div class="p-section-head"><span class="p-section-label">Pozīcija</span></div>
      <div class="p-blocks" id="pb-layout"></div>
    </div>
    <div class="p-section">
      <div class="p-section-head"><span class="p-section-label">Logo</span></div>
      <div class="p-blocks" id="pb-logo"></div>
    </div>
  </aside>

  <main class="canvas-area" id="canvasArea">
    <div class="canvas-topbar">
      <span class="canvas-topbar-label">Darba virsma</span>
      <span class="canvas-topbar-hint">velc blokus šeit →</span>
      <div style="flex:1"></div>
      <span class="block-count-badge"><span id="blockCount">0</span> bloki</span>
      <button class="btn-clear" id="btnClear">Notīrīt</button>
    </div>
    <div class="canvas-drop" id="canvasDrop">
      <div class="canvas-grid"></div>
      <div class="canvas-empty" id="canvasEmpty">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor"
             stroke-width="1.2" opacity="0.2">
          <rect x="4" y="4" width="17" height="17" rx="3"/>
          <rect x="27" y="4" width="17" height="17" rx="3"/>
          <rect x="4" y="27" width="17" height="17" rx="3"/>
          <rect x="27" y="27" width="17" height="17" rx="3"/>
        </svg>
        <div class="canvas-empty-text">Velc bloku šeit, lai sāktu</div>
      </div>
      <div class="canvas-scroll" id="canvasScroll"></div>
    </div>
  </main>

</div>

<script src="app.js"></script>
</body>
</html>
